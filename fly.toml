# fly.toml — Fly.io configuration for discord-youtube-status-bot
# Docs: https://fly.io/docs/reference/configuration/

app = 'app-holy-voice-296'
primary_region = 'iad'

[build]

# The Flask keep-alive server inside bot.py listens on this port
[http_service]
  internal_port = 8080
  force_https = true
  # CRITICAL: Never auto-stop — this is a long-running Discord bot
  auto_stop_machines = 'off'
  auto_start_machines = true
  # CRITICAL: Always keep at least 1 machine running
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '256mb'
