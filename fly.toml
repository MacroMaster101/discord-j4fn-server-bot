# fly.toml app configuration file generated for discord-youtube-status-bot on 2026-05-19T12:57:13Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'discord-youtube-status-bot'
primary_region = 'iad'

[build]

[deploy]
  strategy = 'rolling'
  wait_timeout = '5m'

[[checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/health"
  port = 8080
  timeout = "5s"
  type = "http"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
